# Application Configuration
quarkus.application.name=Domain Registrar MCP Server
quarkus.application.version=2.0.0

# Basic HTTP settings
quarkus.http.port=8081
quarkus.http.limits.max-body-size=1M
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:https://osir.com,https://agent.osir.com,https://claude.ai}
quarkus.http.cors.headers=Authorization,Content-Type,Accept,Mcp-Session-Id
quarkus.http.cors.exposed-headers=Mcp-Session-Id
quarkus.http.cors.methods=GET,POST,DELETE
%dev.quarkus.http.cors.origins=/.*/

# MCP Server transports (SSE + Streamable HTTP)
quarkus.mcp.server.sse.root-path=mcp
quarkus.mcp.server.http.root-path=mcp/http
quarkus.mcp.server.tools.page-size=200

# Logging
quarkus.log.level=INFO
quarkus.log.console.stderr=false
quarkus.banner.enabled=false


# Alternative configuration format (try this if above doesn't work)
quarkus.rest-client."domain-backend".url=${OSIR_BACKEND_URL:https://be.osir.com}
quarkus.rest-client."domain-backend".scope=jakarta.inject.Singleton

# Deploy backend (C2) — the deployment orchestrator. Default points at the real backend (NOT
# localhost) so an unset env doesn't silently call the MCP's own host. Bounded timeouts so a slow
# or hung backend can't tie up MCP worker threads.
quarkus.rest-client."deploy-backend".url=${DEPLOY_BACKEND_URL:https://be-deploy.osir.com}
quarkus.rest-client."deploy-backend".scope=jakarta.inject.Singleton
quarkus.rest-client."deploy-backend".connect-timeout=5000
quarkus.rest-client."deploy-backend".read-timeout=30000

# Identify outbound requests in backend access logs
osir.client.user-agent=OSIR MCP Server/2.0
osir.client.source=osir-mcp
org.eclipse.microprofile.rest.client.global.providers=com.osir.mcp.clients.UserAgentClientFilter

# Health and Monitoring
quarkus.smallrye-health.check.disable=false
quarkus.smallrye-health.ui.enable=true

# Cache TTLs (15 minutes for catalog data)
quarkus.cache.caffeine.product-catalog.expire-after-write=15M
quarkus.cache.caffeine.domain-extensions.expire-after-write=15M
quarkus.cache.caffeine.dedicated-catalog.expire-after-write=15M
quarkus.cache.caffeine.domain-pricing.expire-after-write=15M

# Logging Configuration
quarkus.log.console.enable=true
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{1.}] %s%e%n
%dev.quarkus.log.category."com.osir.mcp".level=DEBUG

# Development Mode Settings
%dev.quarkus.http.port=8081

# Ollama Configuration
ollama.base-url=${OLLAMA_URL:http://localhost:11434}
#ollama.model=mistral-small:latest
ollama.model=qwen2.5:14b

# Chat Configuration
chat.max-history=20
chat.session-timeout=3600000
quarkus.http.static-resources.enabled=true

# KeyCloak Device Authorization (RFC 8628)
keycloak.auth-server-url=${KEYCLOAK_URL:https://auth.osir.com}
keycloak.realm=${KEYCLOAK_REALM:osir}
keycloak.client-id=${KEYCLOAK_CLIENT_ID:osir-cli}

# OAuth metadata URLs (used by OAuthProtectedResourceResource and OAuthMetadataResource)
mcp.server.url=${MCP_SERVER_URL:https://be.osir.com/mcp/http}
mcp.authorization-server.url=${MCP_AUTH_SERVER_URL:https://be.osir.com}
auth.token.refresh-buffer-seconds=60

quarkus.rest-client."keycloak-auth".url=${keycloak.auth-server-url}/realms/${keycloak.realm}
quarkus.rest-client."keycloak-auth".scope=jakarta.inject.Singleton