# Test configuration — use in-memory H2
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=drop-and-create

# Stub endpoints for tests (no real backend or KeyCloak)
quarkus.rest-client."domain-backend".url=http://localhost:9999
keycloak.auth-server-url=http://localhost:9998
keycloak.realm=test
keycloak.client-id=test-client
quarkus.rest-client."keycloak-auth".url=http://localhost:9998/realms/test
