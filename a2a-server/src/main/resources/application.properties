# A2A Server Configuration
quarkus.application.name=OSIR A2A Agent Platform
quarkus.application.version=1.0.0

# HTTP - runs on port 8082 (MCP server uses 8081)
quarkus.http.port=8082
quarkus.http.limits.max-body-size=256K
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:https://osir.com,https://agent.osir.com}
quarkus.http.cors.headers=Authorization,Content-Type,Accept
quarkus.http.cors.methods=GET,POST
%dev.quarkus.http.cors.origins=/.*/

# Logging
quarkus.log.level=INFO
quarkus.log.console.stderr=false
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{1.}] [%X{requestId}] %s%e%n
quarkus.banner.enabled=false

# Backend REST client — uses OSIR_BACKEND_URL env var, defaults to production
quarkus.rest-client."domain-backend".url=${OSIR_BACKEND_URL:https://be.osir.com}
quarkus.rest-client."domain-backend".scope=jakarta.inject.Singleton

# Identify outbound requests in backend access logs
osir.client.user-agent=OSIR A2A Server/1.0
osir.client.source=osir-a2a
org.eclipse.microprofile.rest.client.global.providers=com.osir.mcp.clients.UserAgentClientFilter

# Health + OpenAPI
quarkus.smallrye-health.check.disable=false
quarkus.smallrye-openapi.info-title=OSIR A2A Agent Platform
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Google A2A protocol server with 7 specialist agents for domain registrar operations
quarkus.swagger-ui.always-include=true

# Task persistence — H2 file-based (default), switch to PostgreSQL for production
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:file:./data/a2a-tasks;AUTO_SERVER=TRUE
quarkus.hibernate-orm.database.generation=update

# For PostgreSQL in production, override via env vars:
# QUARKUS_DATASOURCE_DB_KIND=postgresql
# QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://localhost:5432/osir_a2a
# QUARKUS_DATASOURCE_USERNAME=osir
# QUARKUS_DATASOURCE_PASSWORD=secret

# Cache TTLs (15 minutes for catalog data)
quarkus.cache.caffeine.product-catalog.expire-after-write=15M
quarkus.cache.caffeine.domain-extensions.expire-after-write=15M
quarkus.cache.caffeine.dedicated-catalog.expire-after-write=15M
quarkus.cache.caffeine.domain-pricing.expire-after-write=15M

# Rate limiting
a2a.rate-limit.max-concurrent-global=${A2A_RATE_LIMIT_GLOBAL:50}
a2a.rate-limit.max-concurrent-per-user=${A2A_RATE_LIMIT_PER_USER:10}

# Request signing (optional — set secret to enable, required=true to enforce)
a2a.signing.secret=${A2A_SIGNING_SECRET:}
a2a.signing.required=${A2A_SIGNING_REQUIRED:false}

# KeyCloak (direct connection for token refresh + device flow)
keycloak.auth-server-url=${KEYCLOAK_URL:https://auth.osir.com}
keycloak.realm=${KEYCLOAK_REALM:osir}
keycloak.client-id=${KEYCLOAK_CLIENT_ID:osir-cli}
quarkus.rest-client."keycloak-auth".url=${keycloak.auth-server-url}/realms/${keycloak.realm}
quarkus.rest-client."keycloak-auth".scope=jakarta.inject.Singleton
